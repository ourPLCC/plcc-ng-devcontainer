name: Release

on:
  push:
    branches: [main]

permissions: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        variant: [plcc-ng, plcc-ng-full]
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space for large image build
        if: matrix.variant == 'plcc-ng-full'
        run: sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/hostedtoolcache/CodeQL

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Determine architecture
        id: arch
        run: echo "arch=$(dpkg --print-architecture)" >> "$GITHUB_OUTPUT"

      - name: Build candidate image and run smoke test
        run: |
          bash scripts/build-and-test.sh "${{ matrix.variant }}" \
            "ghcr.io/ourplcc/devcontainers/${{ matrix.variant }}:${{ github.sha }}-${{ steps.arch.outputs.arch }}"

      - name: Push candidate image
        run: docker push "ghcr.io/ourplcc/devcontainers/${{ matrix.variant }}:${{ github.sha }}-${{ steps.arch.outputs.arch }}"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Generate release bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  publish-images:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        variant: [plcc-ng, plcc-ng-full]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag multi-arch manifests
        env:
          VERSION: ${{ needs.release.outputs.version }}
          IMAGE: ghcr.io/ourplcc/devcontainers/${{ matrix.variant }}
        run: |
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          docker buildx imagetools create \
            -t "$IMAGE:$VERSION" \
            -t "$IMAGE:$MAJOR" \
            -t "$IMAGE:$MAJOR_MINOR" \
            -t "$IMAGE:latest" \
            "$IMAGE:${{ github.sha }}-amd64" \
            "$IMAGE:${{ github.sha }}-arm64"

  publish-feature:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Publish plcc-ng feature
        # Skips versions that are already published.
        run: |
          devcontainer features publish \
            --registry ghcr.io \
            --namespace ourplcc/features \
            ./src
